name: CI
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger parent repository update 
        run: |
          curl -X POST https://api.github.com/repos/haxejam/HaxeBookWeb/dispatches \
          -H 'Accept: application/vnd.github.everest-preview+json' \
          -u l0go:${{ secrets.DISPATCH_TOKEN }} \
          --data '{"event_type": "ping", "client_payload": { "repository": "HaxeBook" }}'
